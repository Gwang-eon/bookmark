<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 240px;
        padding: 16px;
        font-family: "Noto Sans KR", "Segoe UI Variable", sans-serif;
        margin: 0;
      }
      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #0e7c66;
        color: white;
        font-weight: 700;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover {
        background: #0b5f4f;
      }
      p {
        text-align: center;
        color: #6b6459;
        font-size: 13px;
        margin: 8px 0 0;
      }
    </style>
  </head>
  <body>
    <button id="openOrganizer" data-i18n="popup_btn_open">즐겨찾기 정리 도구 열기</button>
    <p data-i18n="popup_hint">새 탭에서 열립니다</p>
    <script type="module" src="popup.js"></script>
  </body>
</html>
